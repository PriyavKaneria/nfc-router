<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NFC Router</title>
    <script defer src="https://umami-sable-xi.vercel.app/script.js" data-website-id="eff0ce71-81c3-44d5-a998-d2943dd00aa5"></script>
  </head>
  <body>
    <p id="status">Routing...</p>
    <script>
      (async function () {
        const statusEl = document.getElementById('status');
        const params = new URLSearchParams(window.location.search);

        const setStatus = (text) => {
          if (statusEl) statusEl.textContent = text;
        };

        const withAbsoluteUrl = (url) => new URL(url, window.location.href).toString();

        const chooseStorage = (store) => (store === 'session' ? window.sessionStorage : window.localStorage);

        const shuffle = (arr) => {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        };

        const normalizeDestinations = (items) =>
          (items || [])
            .map((item) => {
              if (typeof item === 'string') return { url: withAbsoluteUrl(item), weight: 1 };
              if (!item || typeof item.url !== 'string') return null;
              const safeWeight = Number.isFinite(item.weight) ? Math.max(1, Math.floor(item.weight)) : 1;
              return { url: withAbsoluteUrl(item.url), weight: safeWeight };
            })
            .filter(Boolean);

        const toWeightedUniqueCycle = (destinations) => {
          const weighted = [];
          destinations.forEach((destination) => {
            for (let i = 0; i < destination.weight; i += 1) weighted.push(destination.url);
          });
          return shuffle(weighted);
        };

        const addCampaignParams = (url, campaignParams) => {
          if (!campaignParams || typeof campaignParams !== 'object') return url;
          const next = new URL(url);
          Object.entries(campaignParams).forEach(([key, value]) => {
            if (typeof value === 'string') next.searchParams.set(key, value);
          });
          return next.toString();
        };

        const resetState = (store, prefix) => {
          const keys = [`${prefix}:seq:index`, `${prefix}:random:remaining`];
          keys.forEach((key) => store.removeItem(key));
        };

        const getDestination = (config, store, prefix) => {
          const destinations = normalizeDestinations(config.destinations);
          if (!destinations.length) throw new Error('No destinations configured.');

          if (config.mode === 'sequential') {
            const key = `${prefix}:seq:index`;
            const last = destinations.length - 1;
            const current = Number.parseInt(store.getItem(key) || '0', 10);
            const safeCurrent = Number.isNaN(current) ? 0 : Math.max(0, Math.min(current, last));
            const destination = destinations[safeCurrent].url;
            store.setItem(key, String(Math.min(safeCurrent + 1, last)));
            return destination;
          }

          if (config.mode === 'random_no_repeat') {
            const key = `${prefix}:random:remaining`;
            let remaining;

            try {
              remaining = JSON.parse(store.getItem(key) || 'null');
            } catch {
              remaining = null;
            }

            if (!Array.isArray(remaining) || remaining.length === 0) {
              remaining = toWeightedUniqueCycle(destinations);
            }

            const destination = remaining.shift();
            store.setItem(key, JSON.stringify(remaining));
            return destination;
          }

          throw new Error(`Unknown mode: ${config.mode}`);
        };

        const preview = params.get('preview') === '1';

        try {
          const response = await fetch('./router-config.json', { cache: 'no-store' });
          if (!response.ok) throw new Error(`Config fetch failed: ${response.status}`);

          const config = await response.json();
          const store = chooseStorage(config.stateStore);
          const prefix = config.storageKeyPrefix || 'nfc-router';

          if (params.get('reset') === '1') {
            resetState(store, prefix);
            if (preview) {
              setStatus('State reset complete. Preview is on, no redirect.');
              return;
            }
          }

          const destination = getDestination(config, store, prefix);
          const destinationWithCampaign = addCampaignParams(destination, config.campaignParams);

          if (preview) {
            setStatus(`Preview mode. Next redirect: ${destinationWithCampaign}`);
            return;
          }

          window.location.replace(destinationWithCampaign);
        } catch (error) {
          setStatus(`Router error: ${error.message}`);
        }
      })();
    </script>
  </body>
</html>
