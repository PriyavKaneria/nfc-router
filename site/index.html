<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NFC Router</title>
    <script defer src="https://umami.priyavkaneria.com/script.js" data-website-id="eff0ce71-81c3-44d5-a998-d2943dd00aa5"></script>
  </head>
  <body>
    <p id="status">Loading...</p>
    <script>
      (async function () {
        const statusEl = document.getElementById('status');
        const params = new URLSearchParams(window.location.search);
        const statusMessages = [
          'Wait for it',
          'You are not ready for this',
          'That guy is crazy',
          'Buckle up',
          'Hold tight',
          'Fasten your seatbelt',
          'Here we go',
          'Strap in',
          "Don't blink",
          'Eyes forward',
          'Stand by',
          'Brace yourself',
          'In transit',
          'On your way',
          'Hang tight',
          'Almost there',
          'Loading you up',
          'Watch this',
          'Pay attention',
          'Stay with me',
          'This is the part where...',
          "You didn't see this coming",
          'Trust the process',
          "We're moving",
          'Off you go',
          'Launching in 3... 2... 1...',
          "Don't look down",
          'No turning back now',
          'The magic is happening',
          "Something's cooking",
          'Plot twist incoming',
          'Surprise incoming',
          'Hold my beer',
          "You're gonna love this",
          "Don't panic",
          "It's happening",
          'Look alive',
          'Eyes on the prize',
          'Gear up',
          'Level loading',
          'Prepare yourself',
          'This might tickle',
          'Mind the gap',
          'One moment of your life',
          "This one's for you",
          'Incoming',
          'Keep your hands inside the ride',
          'The universe is rearranging',
          'Science is working',
          'Magic in progress',
          'Calculating destiny',
          'Your future is buffering',
          'Sit down for this one',
        ];

        const setStatus = (text) => {
          if (statusEl) statusEl.textContent = text;
        };

        const pickRandom = (items) => items[Math.floor(Math.random() * items.length)];

        setStatus(pickRandom(statusMessages));

        try {
          const resolveUrl = new URL('./api/resolve', window.location.href);
          if (params.get('preview') === '1') resolveUrl.searchParams.set('preview', '1');

          const response = await fetch(resolveUrl.toString(), { cache: 'no-store' });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || `Resolve failed: ${response.status}`);
          }

          if (payload.mode === 'karma') {
            setStatus(payload.message || 'Karma mode is active.');
            return;
          }

          if (params.get('preview') === '1') {
            setStatus(`Preview mode. Next redirect: ${payload.redirectUrl}`);
            return;
          }

          if (!payload.redirectUrl) {
            throw new Error('No redirect destination returned.');
          }

          window.location.replace(payload.redirectUrl);
        } catch (error) {
          setStatus(`Router error: ${error.message}`);
        }
      })();
    </script>
  </body>
</html>
